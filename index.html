var AS={ae:true,am:true,mb:true,ib:true,bs:true,cs:false,co:false,ss:false};
var CK='op';;
function toggleStore(k,b){AS[k]=!AS[k];b.classList.toggle('active',AS[k]);showRackSelector();renderCalendar();}
function setRack(r,b){CK=r;document.querySelectorAll('.rack-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');renderCalendar();}
function isLavigneStore(k){return k==='cs'||k==='co'||k==='ss';}
function showRackSelector(){var anyLav=AS.cs||AS.co||AS.ss;document.getElementById('rackSelector').style.display=anyLav?'flex':'none';}

var CY=new Date().getFullYear(),CM=new Date().getMonth();
var MN2=['January','February','March','April','May','June','July','August','September','October','November','December'];
function changeMonth(d){CM+=d;if(CM>11){CM=0;CY++;}if(CM<0){CM=11;CY--;}renderCalendar();}
function renderCalendar(){
  document.getElementById('monthLabel').textContent=MN2[CM]+' '+CY;
  var g=document.getElementById('calendarGrid'),hds=g.querySelectorAll('.day-header');
  g.innerHTML='';hds.forEach(function(h){g.appendChild(h);});
  var td=new Date(),fd=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate();
  for(var i=0;i<fd;i++){var e=document.createElement('div');e.className='day-cell empty';g.appendChild(e);}
  for(var d=1;d<=dim;d++){
    var ds=CY+'-'+String(CM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dw=new Date(CY,CM,d).getDay(),isW=dw===0||dw===6;
    var isT=td.getFullYear()===CY&&td.getMonth()===CM&&td.getDate()===d;
    var c=document.createElement('div');c.className='day-cell'+(isW?' weekend':'')+(isT?' today':'');
    var dn=document.createElement('div');dn.className='day-num';dn.textContent=d;c.appendChild(dn);
    var p=D[ds],aA=AS.ae||AS.am||AS.mb||AS.ib||AS.bs||AS.cs||AS.co||AS.ss;
    if(p&&aA){
      ['ae','am','mb','ib','bs','cs','co','ss'].filter(function(k){return AS[k];}).forEach(function(sk){
        var sp=isLavigneStore(sk)?p[sk+'_'+CK]:p[sk];if(!sp)return;
        var en=document.createElement('div');en.className='price-entry';
        var sl=document.createElement('div');sl.className='store-label '+sk;sl.textContent=sk.toUpperCase();en.appendChild(sl);
        [['reg','Reg'],['sup','Sup'],['die','Dsl']].forEach(function(pr){
          var r=document.createElement('div');r.className='price-row';
          r.innerHTML='<span>'+pr[1]+'</span><span>$'+sp[pr[0]].toFixed(3)+'</span>';en.appendChild(r);
        });c.appendChild(en);
      });
      if(isW){var wn=document.createElement('div');wn.className='weekend-note';wn.textContent='(Fri rates)';c.appendChild(wn);}
    }else{var nd=document.createElement('div');nd.className='no-data';nd.textContent=isW?'Weekend':'No data';c.appendChild(nd);}
    g.appendChild(c);
  }
  renderSummary();
  document.getElementById('lastUpdated').textContent='Data last updated: '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
function renderSummary(){
  var sb=document.getElementById('summaryBar');sb.innerHTML='';
  var types=[['reg','E10 Regular Unleaded'],['sup','E10 Super Unleaded'],['die','Highway ULSD'],['mid','E10 Midgrade 89'],['prem','E10 Premium 93']];
  var sts=['ae','am','mb','ib','bs','cs','co','ss'].filter(function(k){return AS[k];});
  var dim=new Date(CY,CM+1,0).getDate();
  types.forEach(function(tp){
    var vals=[];
    for(var dd=1;dd<=dim;dd++){
      var dw=new Date(CY,CM,dd).getDay();if(dw===0||dw===6)continue;
      var ds=CY+'-'+String(CM+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      var pr=D[ds];if(pr)sts.forEach(function(k){if(pr[k])vals.push(pr[k][tp[0]]);});
    }
    var card=document.createElement('div');card.className='summary-card';
    if(!vals.length){card.innerHTML='<h3>'+tp[1]+'</h3><p class="no-data">No data this month</p>';}
    else{var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
    card.innerHTML='<h3>'+tp[1]+'</h3><div class="summary-stat"><span class="label">Avg</span><span class="val">$'+avg.toFixed(3)+'</span></div><div class="summary-stat"><span class="label">Low</span><span class="val">$'+mn.toFixed(3)+'</span></div><div class="summary-stat"><span class="label">High</span><span class="val">$'+mx.toFixed(3)+'</span></div>';}
    sb.appendChild(card);
  });
}
if(sessionStorage.getItem('u')==='1')renderCalendar();
