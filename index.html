<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evans Oil Gas Prices</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
#lockScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a2e; }
#lockScreen .lock-box { background: #16213e; border: 1px solid #0f3460; border-radius: 16px; padding: 40px; text-align: center; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
#lockScreen .lock-icon { font-size: 48px; margin-bottom: 16px; }
#lockScreen h2 { color: #e94560; margin-bottom: 8px; font-size: 1.4rem; }
#lockScreen p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
#lockScreen input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #0f3460; background: #0f3460; color: #fff; font-size: 1rem; margin-bottom: 12px; outline: none; text-align: center; letter-spacing: 2px; }
#lockScreen input:focus { border-color: #e94560; }
#lockScreen button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
#lockScreen button:hover { background: #c73652; }
#lockScreen .error { color: #e94560; font-size: 0.85rem; margin-top: 8px; display: none; }
#app { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
header { text-align: center; padding: 20px 0 10px; }
header h1 { font-size: 1.8rem; color: #e94560; }
header p { color: #888; font-size: 0.9rem; }
.store-selector { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
.store-btn { padding: 10px 20px; border-radius: 24px; border: 2px solid; cursor: pointer; font-weight: 600; font-size: 0.9rem; background: transparent; }
.store-btn.ae { color: #4ecdc4; border-color: #4ecdc4; }
.store-btn.ae.active { background: #4ecdc4; color: #1a1a2e; }
.store-btn.am { color: #ff6b6b; border-color: #ff6b6b; }
.store-btn.am.active { background: #ff6b6b; color: #1a1a2e; }
.store-btn.mb { color: #ffd93d; border-color: #ffd93d; }
.store-btn.mb.active { background: #ffd93d; color: #1a1a2e; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 10px 0 20px; }
.month-nav button { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
.month-nav h2 { font-size: 1.3rem; color: #e0e0e0; min-width: 180px; text-align: center; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-header { text-align: center; padding: 8px; font-weight: 600; font-size: 0.8rem; color: #888; background: #16213e; border-radius: 6px; }
.day-cell { background: #16213e; border-radius: 8px; padding: 8px; min-height: 100px; border: 1px solid #0f3460; }
.day-cell.empty { background: transparent; border-color: transparent; }
.day-cell.weekend { background: #12192e; }
.day-cell.today { border-color: #e94560; }
.day-num { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: #aaa; }
.day-cell.today .day-num { color: #e94560; }
.price-entry { margin-bottom: 4px; }
.store-label { font-size: 0.65rem; font-weight: 700; margin-bottom: 2px; }
.store-label.ae { color: #4ecdc4; }
.store-label.am { color: #ff6b6b; }
.store-label.mb { color: #ffd93d; }
.price-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: #ccc; }
.price-row span:first-child { color: #888; }
.no-data { font-size: 0.7rem; color: #444; font-style: italic; padding: 4px 0; }
.weekend-note { font-size: 0.65rem; color: #555; margin-top: 4px; }
.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
.summary-card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 16px; }
.summary-card h3 { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
.summary-stat { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
.summary-stat .label { color: #888; }
.summary-stat .val { font-weight: 700; color: #e0e0e0; }
.last-updated { text-align: center; color: #555; font-size: 0.75rem; margin-top: 20px; padding-bottom: 20px; }
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">&#128274;</div>
    <h2>Evans Oil Price Calendar</h2>
    <p>Private access only. Enter password to continue.</p>
    <input type="password" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()">Unlock</button>
    <div class="error" id="pwdError">Incorrect password.</div>
  </div>
</div>
<div id="app">
  <header>
    <h1>Evans Oil Gas Prices</h1>
    <p>Daily prices from Evans Oil Company, L.L.C. | Buckeye Terminals, Opelousas LA</p>
  </header>
  <div class="store-selector">
    <button class="store-btn ae active" onclick="toggleStore('ae',this)">Acadian Express</button>
    <button class="store-btn am active" onclick="toggleStore('am',this)">Acadiana Mart</button>
    <button class="store-btn mb active" onclick="toggleStore('mb',this)">Moss Bluff Chevron</button>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&larr;</button>
    <h2 id="monthLabel"></h2>
    <button onclick="changeMonth(1)">&rarr;</button>
  </div>
  <div class="calendar-grid" id="calendarGrid">
    <div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div>
    <div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <div class="last-updated" id="lastUpdated"></div>
</div>
<script>
function checkPwd(){var v=document.getElementById('pwdInput').value;if(v===atob('RXNoYWFuNzg2JA==')){document.getElementById('lockScreen').style.display='none';document.getElementById('app').style.display='block';sessionStorage.setItem('u','1');renderCalendar();}else{document.getElementById('pwdError').style.display='block';document.getElementById('pwdInput').value='';}}
if(sessionStorage.getItem('u')==='1'){document.getElementById('lockScreen').style.display='none';document.getElementById('app').style.display='block';}
var D={};
var AS={ae:true,am:true,mb:true};
function toggleStore(k,b){AS[k]=!AS[k];b.classList.toggle('active',AS[k]);renderCalendar();}
var CY=new Date().getFullYear(),CM=new Date().getMonth();
var MN2=['January','February','March','April','May','June','July','August','September','October','November','December'];
function changeMonth(d){CM+=d;if(CM>11){CM=0;CY++;}if(CM<0){CM=11;CY--;}renderCalendar();}
function renderCalendar(){
  document.getElementById('monthLabel').textContent=MN2[CM]+' '+CY;
  var g=document.getElementById('calendarGrid'),hds=g.querySelectorAll('.day-header');
  g.innerHTML='';hds.forEach(function(h){g.appendChild(h);});
  var td=new Date(),fd=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate();
  for(var i=0;i<fd;i++){var e=document.createElement('div');e.className='day-cell empty';g.appendChild(e);}
  for(var d=1;d<=dim;d++){
    var ds=CY+'-'+String(CM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dw=new Date(CY,CM,d).getDay(),isW=dw===0||dw===6;
    var isT=td.getFullYear()===CY&&td.getMonth()===CM&&td.getDate()===d;
    var c=document.createElement('div');c.className='day-cell'+(isW?' weekend':'')+(isT?' today':'');
    var dn=document.createElement('div');dn.className='day-num';dn.textContent=d;c.appendChild(dn);
    var p=D[ds],aA=AS.ae||AS.am||AS.mb;
    if(p&&aA){
      ['ae','am','mb'].filter(function(k){return AS[k];}).forEach(function(sk){
        var sp=p[sk];if(!sp)return;
        var en=document.createElement('div');en.className='price-entry';
        var sl=document.createElement('div');sl.className='store-label '+sk;sl.textContent=sk.toUpperCase();en.appendChild(sl);
        [['reg','Reg'],['sup','Sup'],['die','Dsl']].forEach(function(pr){
          var r=document.createElement('div');r.className='price-row';
          r.innerHTML='<span>'+pr[1]+'</span><span>$'+sp[pr[0]].toFixed(3)+'</span>';en.appendChild(r);
        });c.appendChild(en);
      });
      if(isW){var wn=document.createElement('div');wn.className='weekend-note';wn.textContent='(Fri rates)';c.appendChild(wn);}
    }else{var nd=document.createElement('div');nd.className='no-data';nd.textContent=isW?'Weekend':'No data';c.appendChild(nd);}
    g.appendChild(c);
  }
  renderSummary();
  document.getElementById('lastUpdated').textContent='Data last updated: '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
function renderSummary(){
  var sb=document.getElementById('summaryBar');sb.innerHTML='';
  var types=[['reg','E10 Regular Unleaded'],['sup','E10 Super Unleaded'],['die','Highway ULSD']];
  var sts=['ae','am','mb'].filter(function(k){return AS[k];});
  var dim=new Date(CY,CM+1,0).getDate();
  types.forEach(function(tp){
    var vals=[];
    for(var dd=1;dd<=dim;dd++){
      var dw=new Date(CY,CM,dd).getDay();if(dw===0||dw===6)continue;
      var ds=CY+'-'+String(CM+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      var pr=D[ds];if(pr)sts.forEach(function(k){if(pr[k])vals.push(pr[k][tp[0]]);});
    }
    var card=document.createElement('div');card.className='summary-card';
    if(!vals.length){card.innerHTML='<h3>'+tp[1]+'</h3><p class="no-data">No data this month</p>';}
    else{var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
    card.innerHTML='<h3>'+tp[1]+'</h3><div class="summary-stat"><span class="label">Avg</span><span class="val">$'+avg.toFixed(3)+'</span></div><div class="summary-stat"><span class="label">Low</span><span class="val">$'+mn.toFixed(3)+'</span></div><div class="summary-stat"><span class="label">High</span><span class="val">$'+mx.toFixed(3)+'</span></div>';}
    sb.appendChild(card);
  });
}
if(sessionStorage.getItem('u')==='1')renderCalendar();
</script>
</body>
</html>
