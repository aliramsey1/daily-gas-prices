name: Update Evans Oil Prices Daily

on:
  schedule:
    # Runs at 2:00 PM CST (20:00 UTC) on weekdays — after Evans Oil sends their daily email
    - cron: '0 20 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Fetch Evans Oil prices from Gmail
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python fetch_prices.py

      - name: Commit updated prices
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: Evans Oil prices $(date +'%Y-%m-%d')"
          git push
