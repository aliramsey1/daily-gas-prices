name: Update Evans Oil Prices Daily

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 2 PM CST (20:00 UTC) Mon-Fri
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install secure-smtplib pdfminer.six requests beautifulsoup4

      - name: Run Evans/Lavigne price fetcher
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_prices.py

      - name: Run Guillory Oil price fetcher
        env:
          GUILLORY_USERNAME: ${{ secrets.GUILLORY_USERNAME }}
          GUILLORY_PASSWORD: ${{ secrets.GUILLORY_PASSWORD }}
        run: python fetch_guillory.py

      - name: Run Campbell Oil price fetcher
        env:
          CAMPBELL_GMAIL_ADDRESS: ${{ secrets.CAMPBELL_GMAIL_ADDRESS }}
          CAMPBELL_GMAIL_APP_PASSWORD: ${{ secrets.CAMPBELL_GMAIL_APP_PASSWORD }}
        run: python fetch_campbell.py

      - name: Rebuild index.html with all price data
        run: |
          python << 'EOF'
import json, re
with open('prices.json', 'r') as f:
    prices_data = json.load(f)
date_keys = sorted(prices_data.keys())
lines_out = ['var D={']
for i, dk in enumerate(date_keys):
    stores = prices_data[dk]
    store_parts = []
    for sc, prods in stores.items():
        prod_parts = ['"{}":{}' .format(pk, pv) for pk, pv in prods.items()]
        store_parts.append('"{}":{{{}}}' .format(sc, ','.join(prod_parts)))
    comma = ',' if i < len(date_keys) - 1 else ''
    lines_out.append('"{}":{{{}}}{}' .format(dk, ','.join(store_parts), comma))
lines_out.append('};')
js_data = '\n'.join(lines_out)
with open('index.html', 'r', encoding='utf-8') as f:
    html = f.read()
html = re.sub(r'var D=\{[\s\S]*?\};', js_data, html)
with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)
print('Rebuilt index.html with all price data including Pop N Go')
EOF


      - name: Commit updated prices
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add prices.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update gas prices $(date +%Y-%m-%d)"
            git push
          fi
