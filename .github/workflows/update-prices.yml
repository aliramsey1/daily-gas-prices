name: Update Evans Oil Prices Daily

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 2 PM CST (20:00 UTC) Mon-Fri
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install secure-smtplib

      - name: Run price fetcher
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_prices.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html prices.json
          git diff --staged --quiet || git commit -m "Auto-update gas prices $(date +'%Y-%m-%d')"
          git push
