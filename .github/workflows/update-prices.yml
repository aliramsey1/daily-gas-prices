name: Update Evans Oil Prices Daily

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 2 PM CST (20:00 UTC) Mon-Fri
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install secure-smtplib pdfminer.six requests beautifulsoup4

      - name: Run Evans/Lavigne price fetcher
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_prices.py

      - name: Run Guillory Oil price fetcher
        env:
          GUILLORY_USERNAME: ${{ secrets.GUILLORY_USERNAME }}
          GUILLORY_PASSWORD: ${{ secrets.GUILLORY_PASSWORD }}
        run: python fetch_guillory.py

      - name: Run Campbell Oil price fetcher
        env:
          CAMPBELL_GMAIL_ADDRESS: ${{ secrets.CAMPBELL_GMAIL_ADDRESS }}
          CAMPBELL_GMAIL_APP_PASSWORD: ${{ secrets.CAMPBELL_GMAIL_APP_PASSWORD }}
        run: python fetch_campbell.py

      - name: Commit updated prices
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "Auto-update gas prices $(date +%Y-%m-%d)"
          git push
